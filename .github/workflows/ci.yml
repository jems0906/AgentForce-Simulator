name: CI

on:
  push:
  pull_request:

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest
    env:
      STORAGE_BACKEND: postgres
      POSTGRES_DSN: sqlite+aiosqlite:///./agentforce.db
      API_AUTH_ENABLED: false
      EXPORT_SIGNING_KEY_ID: ci-current
      EXPORT_SIGNING_SECRET: ci-signing-secret
      EXPORT_VERIFY_MAX_AGE_SECONDS: 300
      EXPORT_VERIFY_MAX_CLOCK_SKEW_SECONDS: 30
      EXPORT_VERIFY_RATE_LIMIT_COUNT: 30
      EXPORT_VERIFY_RATE_LIMIT_WINDOW_SECONDS: 60
      SECURITY_AUDIT_RETENTION_MAX_EVENTS: 5000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests
        run: python -m pytest

      - name: Start API for smoke check
        run: |
          uvicorn api_app:app --host 127.0.0.1 --port 8000 &

      - name: Wait for API
        run: |
          python - <<'PY'
          import time
          import httpx

          deadline = time.time() + 30
          while time.time() < deadline:
              try:
                  response = httpx.get("http://127.0.0.1:8000/api/health", timeout=2.0)
                  if response.status_code == 200:
                      raise SystemExit(0)
              except Exception:
                  time.sleep(1)
          raise SystemExit("API did not become healthy in time")
          PY

      - name: Run security smoke script
        run: |
          mkdir -p artifacts
          set -o pipefail
          python scripts/security_smoke.py --base-url http://127.0.0.1:8000 | tee artifacts/security-smoke-report.json

      - name: Upload smoke report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-smoke-report
          path: artifacts/security-smoke-report.json
          if-no-files-found: warn
